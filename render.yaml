services:
  - type: web
    name: fb-ai-agent
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FB_ACCESS_TOKEN
        sync: false
      - key: FB_PAGE_ID
        sync: false
